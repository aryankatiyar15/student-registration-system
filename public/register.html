<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card register-card">
      <div class="brand-mark">SP</div>
      <h1>Student Registration</h1>
      <p class="page-subtitle">Register once, then login to view the live MySQL dashboard.</p>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="name">Student Name</label>
          <input type="text" id="name" name="name" placeholder="Enter student name" autocomplete="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="student@example.com" autocomplete="email" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Minimum 6 characters" autocomplete="new-password" required>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" required>
          </div>
        </div>

        <p id="message" class="message" aria-live="polite"></p>

        <button type="submit" class="primary-button" id="registerButton">Register</button>
      </form>

      <p class="form-footer">
        Already registered?
        <a href="/login.html">Login here</a>
      </p>
    </section>
  </main>

  <script src="/js/register.js"></script>
</body>
</html>
